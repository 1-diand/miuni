<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Preloader Espacial</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    /* Contenedor del preloader */
    #preloader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Estilo del GIF */
    #gifLoader {
      width: 400px;
      z-index: 2;
    }

    /* Barra de progreso neon */
    .progress-container {
      width: 90%;
      max-width: 400px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #00f7ff;
      box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
      margin-top: 30px;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f7ff, #00fff7);
      box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
      transition: width 0.2s ease-in-out;
    }

    #iframeContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Contenedor principal centrado -->
  <div id="preloader-container">
    <img id="gifLoader" src="Space.gif" alt="Cargando..." />
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <script>
    const iframe = document.createElement("iframe");
    iframe.src = "miunipag1.html";
    iframe.style.position = "fixed";
    iframe.style.top = "0";
    iframe.style.left = "0";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.style.display = "none";
    iframe.id = "mIframe";

    document.body.appendChild(iframe);

    // Activar fullscreen
    if (iframe.requestFullscreen) {
      iframe.requestFullscreen();
    }
  </script>

  <script src="loader.js"></script>

</body>
</html>
